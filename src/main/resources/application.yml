server:
  port: 8080

spring:
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/psych_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&useUnicode=true&allowPublicKeyRetrieval=true
    username: root
    password: password
    hikari:
      # 连接池配置
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # 连接测试配置
      connection-test-query: SELECT 1
      validation-timeout: 5000
      # 连接命名（便于调试）
      pool-name: HikariCP-Production


mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted # 全局逻辑删除字段名
      logic-not-delete-value: 0   # 未删除值
      logic-delete-value: 1       # 已删除值

jwt:
  # 必须是 ≥32 字符的强密钥！可用命令生成：openssl rand -base64 32
  secret: 6JzpJw4l4CEZjGGnXPb8wapw4s5ztMWMaMOw39ZKIRQ=
  # Token 有效期（毫秒），默认 2 小时
  expiration-ms: 7200000 # token 有效期（秒），默认 2 小时


